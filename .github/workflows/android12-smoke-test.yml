name: Android 12 Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android12-smoke-test.yml"
      - "app/**"
      - "gradle/**"
      - "vendor/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "Makefile"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: read

jobs:
  launch-test:
    name: Install and launch on API 31
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.2.12479018"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Rust targets
        shell: bash
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android

      - name: Build APK
        shell: bash
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME_17: ${{ env.JAVA_HOME }}
        run: |
          chmod +x ./gradlew
          make build

      - name: Run launch check on API 31
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p "$GITHUB_WORKSPACE/test-output"
            echo "com.danielealbano.androidremotecontrolmcp.debug" > "$GITHUB_WORKSPACE/test-output/app-id.txt"
            adb wait-for-device
            adb devices > "$GITHUB_WORKSPACE/test-output/devices.txt"
            until [ "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1" ]; do sleep 2; done
            adb shell input keyevent 82 || true
            sleep 30
            adb logcat -c || true
            adb install --no-streaming -r "$GITHUB_WORKSPACE/app/build/outputs/apk/debug/app-debug.apk" > "$GITHUB_WORKSPACE/test-output/install.txt" 2>&1 || (adb logcat -d -v time > "$GITHUB_WORKSPACE/test-output/logs.txt" 2>&1 || true; exit 1)
            adb shell monkey -p com.danielealbano.androidremotecontrolmcp.debug -c android.intent.category.LAUNCHER 1 > "$GITHUB_WORKSPACE/test-output/launch.txt" 2>&1 || (adb logcat -d -v time > "$GITHUB_WORKSPACE/test-output/logs.txt" 2>&1 || true; exit 1)
            sleep 15
            adb shell pidof com.danielealbano.androidremotecontrolmcp.debug > "$GITHUB_WORKSPACE/test-output/pid.txt" 2>&1 || (adb logcat -d -v time > "$GITHUB_WORKSPACE/test-output/logs.txt" 2>&1 || true; adb shell dumpsys activity activities > "$GITHUB_WORKSPACE/test-output/activity.txt" 2>&1 || true; exit 1)
            adb logcat -d -v time > "$GITHUB_WORKSPACE/test-output/logs.txt" 2>&1 || true
            adb shell dumpsys activity activities > "$GITHUB_WORKSPACE/test-output/activity.txt" 2>&1 || true
            echo "launch_exit=0" > "$GITHUB_WORKSPACE/test-output/exit.txt"
            echo "pid_exit=0" >> "$GITHUB_WORKSPACE/test-output/exit.txt"

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android12-smoke-test-output
          path: ${{ github.workspace }}/test-output/**
          if-no-files-found: warn
          retention-days: 14
